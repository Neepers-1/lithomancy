<body>

<!-- Chat Log -->
<div id="chat-log-wrap"></div>
<!-- Notifications -->
<div id="notif-wrap"></div>
<!-- Dialog container -->
<div id="dialog-container"></div>

<!-- Main Monitor Mount -->
<div id="litho-mount"></div>

<script>
/* ═══════════════════════════════════════════════════════════
 * FOUNDRY VTT SHIM LAYER
 * Mocks: canvas, game, ui, Dialog, ChatMessage, AudioHelper,
 *        Roll, fromUuid, Hooks, Sequence
 * ═══════════════════════════════════════════════════════════ */

// ── Dice roller ─────────────────────────────────────────────
class Roll {
  constructor(formula) { this.formula = formula; this.total = 0; this.terms = []; }
  async evaluate() {
    const result = this._parseAndRoll(this.formula);
    this.total = result.total;
    this.terms = result.terms;
    return this;
  }
  _parseAndRoll(formula) {
    // handle "XdY + Z" or "XdY - Z" etc.
    let total = 0;
    const terms = [];
    const cleaned = formula.replace(/\s/g,'');
    // split by + and - while keeping sign
    const parts = cleaned.match(/[+\-]?[^+\-]+/g) || [];
    for (const part of parts) {
      const dMatch = part.match(/([+\-]?)(\d+)d(\d+)/i);
      const nMatch = part.match(/([+\-]?\d+)$/);
      if (dMatch) {
        const sign = dMatch[1] === '-' ? -1 : 1;
        const num = parseInt(dMatch[2]);
        const sides = parseInt(dMatch[3]);
        const rolls = [];
        for (let i = 0; i < num; i++) {
          const r = Math.floor(Math.random() * sides) + 1;
          rolls.push(r);
          total += sign * r;
        }
        terms.push({ results: rolls.map(r=>({result:r})), number:num, faces:sides });
      } else if (nMatch) {
        total += parseInt(nMatch[1]);
      }
    }
    return { total, terms };
  }
  async toMessage({ flavor } = {}) {
    const msgHtml = `<div style="font-size:0.85em;">${flavor || ''}<div style="margin-top:4px;border-top:1px dashed #333;padding-top:4px;">🎲 <strong>Result: ${this.total}</strong></div></div>`;
    addChatMessage(msgHtml);
  }
}

// ── ChatMessage ──────────────────────────────────────────────
const ChatMessage = {
  create({ content }) { addChatMessage(content); }
};

function addChatMessage(html) {
  const log = document.getElementById('chat-log-wrap');
  if (!log) return;
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  // keep only last 20
  while (log.children.length > 20) log.removeChild(log.firstChild);
}

// ── Notifications ─────────────────────────────────────────────
const ui = {
  notifications: {
    warn(msg) { showNotif(msg, 'warn'); },
    error(msg) { showNotif(msg, 'error'); },
    info(msg) { showNotif(msg, 'success'); }
  },
  windows: {}
};

function showNotif(msg, type='warn') {
  const wrap = document.getElementById('notif-wrap');
  const div = document.createElement('div');
  div.className = 'notif' + (type==='error'?' error':type==='success'?' success':'');
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

// ── Dialog (rendered inline) ──────────────────────────────────
let _dialogCounter = 0;
class Dialog {
  constructor({ title='', content='', buttons={}, render:onRender, close:onClose } = {}, opts={}) {
    this.title = title;
    this.content = content;
    this.buttons = buttons;
    this.onRender = onRender;
    this.onClose = onClose;
    this.opts = opts;
    this.id = opts.id || `dialog-${_dialogCounter++}`;
    ui.windows[this.id] = this;
  }
  render(show) {
    if (!show) return;
    const container = document.getElementById('dialog-container');

    // Overlay
    const overlay = document.createElement('div');
    overlay.className = 'fvtt-dialog-overlay';
    overlay.id = `overlay-${this.id}`;

    const box = document.createElement('div');
    box.className = 'fvtt-dialog';
    box.id = this.id;

    box.innerHTML = `<h2>${this.title}</h2><div class="dialog-content">${this.content}</div><div class="dialog-buttons"></div>`;

    const btnWrap = box.querySelector('.dialog-buttons');
    for (const [key, cfg] of Object.entries(this.buttons)) {
      const btn = document.createElement('button');
      btn.textContent = cfg.label || key;
      btn.addEventListener('click', () => {
        if (cfg.callback) cfg.callback($(box));
        this.close();
      });
      btnWrap.appendChild(btn);
    }

    overlay.appendChild(box);
    container.appendChild(overlay);

    // Close on overlay click (outside box)
    overlay.addEventListener('click', (e) => { if (e.target === overlay) this.close(); });

    if (this.onRender) this.onRender($(box));
    return this;
  }
  close() {
    const el = document.getElementById(`overlay-${this.id}`);
    if (el) el.remove();
    delete ui.windows[this.id];
    if (this.onClose) this.onClose();
  }
  setPosition() {}
}

// ── AudioHelper (silent stub) ──────────────────────────────────
const AudioHelper = {
  play() { return { id: Math.random(), stop() {} }; }
};

// ── fromUuid (stub — audio not supported standalone) ──────────
async function fromUuid(uuid) { return null; }

// ── Hooks ─────────────────────────────────────────────────────
const Hooks = { once() {} };

// ── canvas & game ─────────────────────────────────────────────
// We store node data in localStorage keyed by token id
const _nodeStore = {};

const _tokenDoc = {
  _flags: {},
  getFlag(scope, key) { return this._flags[key] ?? null; },
  setFlag(scope, key, val) { this._flags[key] = JSON.parse(JSON.stringify(val)); },
  unsetFlag(scope, key) { delete this._flags[key]; }
};

const nodeToken = {
  id: 'standalone-node',
  document: _tokenDoc,
  actor: null
};

const canvas = {
  tokens: { controlled: [nodeToken] },
  scene: { id: 'standalone-scene' }
};

const game = {
  user: { character: null },
  audio: { playing: new Map() },
  modules: { get() { return null; } }
};

/* ═══════════════════════════════════════════════════════════
 * LITHOMANCY MONITOR — FULL GAME CODE (ADAPTED FROM MACRO)
 * ═══════════════════════════════════════════════════════════ */

const SOUNDS = {};
const TYPES = ["Combat Prowess Node", "Arcane Enhancement Node", "Ability Enhancement Node", "Skill Enhancement Node"];
const TYPE_ICONS = ["fa-fist-raised", "fa-scroll", "fa-dna", "fa-tools"];
const TIERS = ["Faint (Tier 1)", "Pale (Tier 2)", "Bright (Tier 3)", "Radiant (Tier 4)", "Prismatic (Tier 5)"];
const TIER_COLORS = ["#7f8c8d", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];

let activeAmbiencePath = null;
let activeResonanceLoop = null;
let _lithoDialog = null;
let _lithoHtml = null;

async function initializeNode(token) {
  const typeIndex = Math.floor(Math.random() * TYPES.length);
  const shellHP = 12;
  const trueStability = Math.floor(Math.random() * 21) + 5;
  const trueResonance = Math.floor(Math.random() * 16) + 5;
  const data = {
    trueType: TYPES[typeIndex], trueTier: TIERS[0], trueTierLevel: 1,
    trueShellHP: shellHP, trueShellMax: shellHP,
    trueStability, trueResonance,
    knownType: false, knownTier: false, knownShell: false, knownStability: false, knownResonance: false,
    currentShellHP: shellHP, currentStability: trueStability,
    stabMin: 0, stabMax: 20, resMin: 5, resMax: 20,
    round: 1, actionsUsed: 0, actionsMax: 4,
    nextDecayValue: null,
    bloodSacrificed: 0, npcBloodSacrificed: 0,
    playerCount: 4, npcCount: 0,
    cycleHistory: []
  };
  await token.document.setFlag("world", "lithomancy", data);
}

async function engageAtmosphere() {
  // In standalone mode we skip actual audio but keep the visual effect
  document.body.style.transition = 'filter 2s ease';
  document.body.style.filter = 'none'; // Don't blur the page itself
}

async function manageHarmonicLoop(isHarmonized) {}
async function playToolSound(action) {}

async function disengageAtmosphere() {}

function actionLabel(act) {
  if (act === "shell") return "Fracture";
  if (act === "heal") return "Stabilize";
  if (act === "res") return "Tune Harmony";
  if (act === "narrow") return "Tune Volatility";
  return act;
}

function narrowRange(data, type, amount) {
  let shrink = Math.ceil(amount / 2);
  if (type === "res") {
    data.resMin = Math.min(data.trueResonance, data.resMin + shrink);
    data.resMax = Math.max(data.trueResonance, data.resMax - shrink);
  } else {
    data.stabMin = Math.min(data.currentStability, data.stabMin + shrink);
    data.stabMax = Math.max(data.currentStability, data.stabMax - shrink);
  }
}

function computeDerivedState(data) {
  const actionsLeft = 4 - data.actionsUsed;
  const isRoundDone = actionsLeft <= 0;
  const typeIdx = TYPES.indexOf(data.trueType);
  const isResDetermined = data.resMin === data.resMax;
  const isStabDetermined = data.stabMin === data.stabMax;
  const gaugesUnknown = !data.knownResonance || !data.knownStability;
  const shellPct = data.currentShellHP / data.trueShellMax;
  const activeColor = TIER_COLORS[data.trueTierLevel - 1] || "#fff";

  const stabRangeStart = (data.stabMin / 20) * 360;
  const stabRangeEnd = (data.stabMax / 20) * 360;
  let stabColor = "#2ecc71", stabShake = "", stabPulse = "";
  const estCenter = (data.stabMin + data.stabMax) / 2;
  if (!data.knownStability) { stabPulse = "animation: litho-pulse 2s infinite ease-in-out; border-color: #9b59b6;"; }
  else {
    if (estCenter <= 5) { stabColor = "#e74c3c"; stabShake = "animation: litho-shake-hard 0.5s infinite;"; }
    else if (estCenter <= 10) { stabColor = "#f39c12"; stabShake = "animation: litho-shake 1s infinite;"; }
  }

  const resRangeStart = (data.resMin / 25) * 360;
  const resRangeEnd = (data.resMax / 25) * 360;
  let resColor = "#3498db", resShake = "", resPulse = "";
  const resSpread = data.resMax - data.resMin;
  if (!data.knownResonance) { resPulse = "animation: litho-pulse 2s infinite ease-in-out; border-color: #9b59b6;"; }
  else {
    if (resSpread > 12) { resShake = "animation: litho-shake-hard 0.5s infinite;"; resColor = "#e74c3c"; }
    else if (resSpread > 5) { resColor = "#f39c12"; }
    else { resShake = "animation: litho-glow 1.5s infinite ease-in-out;"; resColor = "#2ecc71"; }
  }

  let deltaLabel = "UNKNOWN";
  let bonusLabel = `<span style="font-size:2em; color:#a29bfe; animation: litho-glow 2s infinite;">?</span>`;
  let waveColor = "#333", waveSpeed = "0s", isHarmonized = false;
  if (data.knownResonance && data.knownStability) {
    const trueDelta = Math.abs(data.trueResonance - data.currentStability);
    if (trueDelta === 0) {
      isHarmonized = true;
      deltaLabel = "<span style='color:#2ed573; text-shadow: 0 0 10px #2ed573; animation: litho-glow 1s infinite;'>HARMONIC SINGULARITY</span>";
      bonusLabel = "<span style='color:#2ed573; font-weight:bold;'>CRIT (d8) + 2</span>";
      waveColor = "#2ed573"; waveSpeed = "0.5s";
    } else if (trueDelta <= 3) {
      deltaLabel = "HIGH COHERENCE"; bonusLabel = "<span style='color:#2ecc71; font-weight:bold;'>+2 DMG</span>";
      waveColor = "#2ecc71"; waveSpeed = "1s";
    } else if (trueDelta <= 9) {
      deltaLabel = "PARTIAL COHERENCE"; bonusLabel = "<span style='color:#f1c40f;'>+1 DMG</span>";
      waveColor = "#f1c40f"; waveSpeed = "2s";
    } else {
      deltaLabel = "DISSONANT"; bonusLabel = "<span style='color:#e74c3c; font-weight:bold;'>-1 DMG</span>";
      waveColor = "#e74c3c"; waveSpeed = "0.2s";
    }
  }

  let crackOverlay = "", gemShake = "", shellDesc = "SOLID", shellDescColor = "#2ecc71";
  if (data.knownShell) {
    if (shellPct < 0.75) { shellDesc = "CHIPPED"; shellDescColor = "#f1c40f"; crackOverlay += `<path d="M30,30 L45,45 L40,60" stroke="#111" stroke-width="2" fill="none"/>`; }
    if (shellPct < 0.50) { shellDesc = "CRACKED"; shellDescColor = "#e67e22"; crackOverlay += `<path d="M70,20 L60,40 L75,50" stroke="#111" stroke-width="2" fill="none"/>`; }
    if (shellPct < 0.25) { shellDesc = "CRUMBLING"; shellDescColor = "#e74c3c"; crackOverlay += `<path d="M50,50 L50,80 L30,90" stroke="#111" stroke-width="3" fill="none"/><path d="M50,50 L80,30" stroke="#111" stroke-width="2" fill="none"/>`; gemShake = "animation: litho-shake 0.2s infinite;"; }
  } else { shellDesc = "UNKNOWN"; shellDescColor = "#555"; }

  const baseFloors = [20, 25, 30, 38, 45];
  const diceCounts = [3, 3, 4, 4, 5];
  const tierIdx = (data.trueTierLevel || 1) - 1;
  const sMin = baseFloors[tierIdx] || 20;
  const tDiceCount = diceCounts[tierIdx] || 3;
  const sMax = sMin + (tDiceCount * 6);
  let sQual = ((sMax - data.currentShellHP) / (sMax - sMin)) * 100;
  sQual = Math.max(0, Math.min(100, sQual));

  const pcPct = Math.min(100, ((data.bloodSacrificed || 0) / 250) * 100);
  const npcPct = Math.min(100, ((data.npcBloodSacrificed || 0) / 250) * 100);

  return {
    actionsLeft, isRoundDone, typeIdx, isResDetermined, isStabDetermined, gaugesUnknown,
    shellPct, activeColor, tierLvl: data.trueTierLevel || 1,
    stabRangeStart, stabRangeEnd, stabColor, stabShake, stabPulse,
    resRangeStart, resRangeEnd, resColor, resShake, resPulse,
    deltaLabel, bonusLabel, waveColor, waveSpeed, isHarmonized,
    crackOverlay, gemShake, shellDesc, shellDescColor, sQual,
    pcPct, npcPct
  };
}

async function updateUI(token) {
  const html = _lithoHtml;
  if (!html || !html.length) return;
  const data = token.document.getFlag("world", "lithomancy");
  if (!data) return;
  const s = computeDerivedState(data);

  // TYPE CARD
  const typeIcon = data.knownType ? TYPE_ICONS[s.typeIdx] : "fa-question";
  const dispType = data.knownType ? data.trueType : "Unknown Resonance";
  html.find('[data-ui="type-icon"]').attr("class", `fas ${typeIcon}`)
    .css({ color: data.knownType ? '#a29bfe' : '#333', textShadow: data.knownType ? '0 0 10px rgba(162,155,254,0.5)' : 'none' });
  html.find('[data-ui="type-label"]').html(dispType);
  if (data.knownType) {
    html.find('[data-ui="type-btn-wrap"]').html(`<div class="litho-small litho-btn" style="border:none;">Identified</div>`);
  }

  // TIER CARD
  const dispTierLabel = data.knownTier ? data.trueTier : "Unknown Structure";
  html.find('[data-ui="tier-label"]').html(dispTierLabel).css({ color: s.activeColor, textShadow: `0 0 5px ${s.activeColor}` });
  for (let i = 1; i <= 5; i++) {
    const gem = html.find(`.set-tier-btn[data-tier="${i}"]`);
    if (data.knownTier && i <= data.trueTierLevel) {
      gem.css({ opacity: 1, color: s.activeColor, textShadow: `0 0 10px ${s.activeColor}` });
    } else {
      gem.css({ opacity: 0.2, color: '#444', textShadow: 'none' });
    }
  }
  if (data.knownTier) {
    html.find('[data-ui="tier-btn-wrap"]').html(`<div class="litho-small litho-btn" style="border:none;">Structure Known</div>`);
  }

  // SHELL CARD
  html.find('[data-ui="shell-icon"]').css({ color: data.knownShell ? (s.shellPct < 0.25 ? '#e74c3c' : '#888') : '#333' });
  html.find('[data-ui="shell-gem-wrap"]').css({ animation: s.gemShake || 'none' });
  html.find('[data-ui="shell-cracks"]').html(s.crackOverlay);
  html.find('[data-ui="shell-hp"]').html(data.knownShell ? `${data.currentShellHP}/${data.trueShellMax}` : "?? / ??");
  html.find('[data-ui="shell-desc"]').html(s.shellDesc).css({ color: s.shellDescColor });
  if (data.knownShell) {
    html.find('[data-ui="shell-quality-wrap"]').html(`
      <div style="display:flex;flex-direction:column;align-items:center;font-size:0.55em;color:#aaa;font-family:'Cinzel',serif;font-weight:bold;height:100px;">
        <div style="color:#2ecc71;margin-bottom:2px;"><i class="fas fa-smile" style="font-size:1.2em;"></i></div>
        <input type="range" min="0" max="100" value="${s.sQual}" disabled style="-webkit-appearance:slider-vertical;appearance:slider-vertical;height:70px;width:8px;opacity:0.8;">
        <div style="color:#e74c3c;margin-top:2px;"><i class="fas fa-angry" style="font-size:1.2em;"></i></div>
      </div>`);
    html.find('[data-ui="shell-btn-wrap"]').html(`
      <div style="display:flex;gap:5px;height:30px;">
        <button id="reroll-shell" class="litho-btn" style="flex:1;padding:2px;font-size:0.8em;line-height:1;" title="Re-roll Shell"><i class="fas fa-dice"></i></button>
        <button id="edit-shell" class="litho-btn" style="flex:1;padding:2px;font-size:0.8em;line-height:1;" title="Edit HP"><i class="fas fa-edit"></i></button>
      </div>`);
    html.find('#reroll-shell').off('click').on('click', () => doScanShell(token, data));
    html.find('#edit-shell').off('click').on('click', () => doEditShell(token, data));
  } else {
    html.find('[data-ui="shell-quality-wrap"]').html(`<div style="width:20px;"></div>`);
    if (data.knownTier) {
      html.find('[data-ui="shell-btn-wrap"]').html(`<button id="scan-shell" class="litho-btn">Inspect Shell</button>`);
      html.find('#scan-shell').off('click').on('click', () => doScanShell(token, data));
    } else {
      html.find('[data-ui="shell-btn-wrap"]').html(`<button class="litho-btn" disabled>Awaiting Lattice</button>`);
    }
  }

  // RESONANCE DIAL
  const resDial = html.find('[data-ui="res-dial"]');
  if (data.knownResonance) {
    resDial.css({ background: `conic-gradient(transparent ${s.resRangeStart}deg, ${s.resColor} ${s.resRangeStart}deg ${s.resRangeEnd}deg, transparent ${s.resRangeEnd}deg)`, boxShadow: `0 0 10px ${s.resColor}`, animation: s.resShake || s.resPulse || 'none', borderColor: s.resShake ? '' : (s.resPulse ? '#9b59b6' : '#222') });
  } else {
    resDial.css({ background: '#111', boxShadow: '0 0 10px #000', animation: s.resPulse || 'none', borderColor: s.resPulse ? '#9b59b6' : '#222' });
  }
  html.find('[data-ui="res-sub"]').html(s.isResDetermined ? `<span class="litho-lock">LOCKED</span>` : `TUNING...`);
  html.find('[data-ui="res-main"]').html(data.knownResonance ? (s.isResDetermined ? `<b>${data.resMin}</b>` : `${data.resMin}-${data.resMax}`) : `<span class="litho-q">?</span>`);
  if (data.knownResonance) html.find('[data-ui="res-btn-wrap"]').html('');

  // STABILITY DIAL
  const stabDial = html.find('[data-ui="stab-dial"]');
  if (data.knownStability) {
    stabDial.css({ background: `conic-gradient(transparent ${s.stabRangeStart}deg, ${s.stabColor} ${s.stabRangeStart}deg ${s.stabRangeEnd}deg, transparent ${s.stabRangeEnd}deg)`, boxShadow: `0 0 15px ${s.stabColor}`, animation: s.stabShake || s.stabPulse || 'none', borderColor: s.stabShake ? '' : (s.stabPulse ? '#9b59b6' : '#222') });
  } else {
    stabDial.css({ background: '#111', boxShadow: '0 0 15px #000', animation: s.stabPulse || 'none', borderColor: s.stabPulse ? '#9b59b6' : '#222' });
  }
  html.find('[data-ui="stab-sub"]').html(s.isStabDetermined ? `<span class="litho-lock">LOCKED</span>` : `READING...`);
  html.find('[data-ui="stab-main"]').html(data.knownStability ? (s.isStabDetermined ? `<b>${data.stabMin}</b>` : `${data.stabMin}-${data.stabMax}`) : `<span style="font-size:1.5em;color:#a29bfe;">?</span>`);
  if (data.knownStability) html.find('[data-ui="stab-btn-wrap"]').html('');

  // HARMONICS
  html.find('[data-ui="wave-label"]').html(s.deltaLabel);
  html.find('[data-ui="wave-bonus"]').html(s.bonusLabel);
  html.find('[data-ui="wave-bars"]').find('.litho-bar').each(function(i) {
    $(this).css({ background: s.waveColor, animationDuration: s.waveSpeed });
  });

  // BIO-RESONANCE
  html.find('[data-ui="pc-fill"]').css({ height: s.pcPct + '%' });
  html.find('[data-ui="npc-fill"]').css({ height: s.npcPct + '%' });
  html.find('[data-ui="pc-total"]').text(data.bloodSacrificed || 0);
  html.find('[data-ui="npc-total"]').text(data.npcBloodSacrificed || 0);

  // ACTION CHARGE + DICE BUTTONS
  html.find('[data-ui="charge-count"]').text(s.actionsLeft);
  html.find('.dice-btn').each(function() {
    const n = parseInt($(this).data('n'));
    const act = $(this).data('act');
    const isLocked = s.gaugesUnknown || (act === "res" && s.isResDetermined) || (act === "narrow" && s.isStabDetermined);
    const disabled = (n > s.actionsLeft || isLocked);
    $(this).prop('disabled', disabled).css({ opacity: disabled ? 0.2 : 1 });
  });

  html.find('#scan-type, #scan-freq, #scan-stab').prop('disabled', s.isRoundDone).css({ opacity: s.isRoundDone ? 0.5 : 1, cursor: s.isRoundDone ? 'not-allowed' : 'pointer' });

  // ACTION PIPS
  html.find('[data-ui="action-pips"]').html(
    Array(4).fill(0).map((_,i) =>
      `<i class="fas fa-dice-d20" style="font-size:2.8em;margin:0 5px;color:${i<data.actionsUsed?'#222':'#a29bfe'};text-shadow:${i<data.actionsUsed?'none':'0 0 8px #a29bfe'};"></i>`
    ).join("")
  );

  // ROUND + DECAY
  html.find('[data-ui="round-num"]').text(data.round);
  const decayDisplay = data.nextDecayValue !== null
    ? `<span class="litho-danger">-${data.nextDecayValue}</span>`
    : `<span class="litho-muted">-${data.round}d4</span>`;
  html.find('[data-ui="decay-display"]').html(decayDisplay);

  // END ROUND BUTTON
  const endBtn = html.find('#btn-end-round');
  endBtn.prop('disabled', !s.isRoundDone);
  if (s.isRoundDone) {
    endBtn.css({ background: 'linear-gradient(#7a1f1a,#4a0f0c)', color: '#fff', cursor: 'pointer', opacity: 1, animation: 'litho-btnpulse 1.5s infinite', border: '1px solid #b84a3c' });
  } else {
    endBtn.css({ background: '#1c1c1e', color: '#555', cursor: 'not-allowed', opacity: 0.6, animation: 'none', border: '1px solid #333' });
  }

  // FORECAST BUTTON
  if (data.nextDecayValue === null) {
    html.find('[data-ui="forecast-wrap"]').html(`<button id="btn-est-decay" class="litho-btn" style="width:140px;border-color:#8e44ad;color:#a29bfe;margin:0;padding:6px 0;">Forecast (2d8)</button>`);
    html.find('#btn-est-decay').off('click').on('click', () => doForecast(token, data));
  } else {
    html.find('[data-ui="forecast-wrap"]').html(`<div style="width:140px;text-align:center;font-size:0.7em;color:#2ecc71;font-weight:700;margin:0;padding:6px 0;">Forecast Locked</div>`);
  }

  html.find('#disp-pc').text(data.playerCount + ' PCs');
  html.find('#disp-npc').text(data.npcCount + ' NPCs');
}

async function doScanShell(token, data) {
  const pBonus = data.playerCount || 4;
  const baseFloors = [20, 25, 30, 38, 45];
  const baseTierHP = baseFloors[data.trueTierLevel - 1] || 20;
  const diceMap = ["3d6", "3d6", "4d6", "4d6", "5d6"];
  const tierRoll = await new Roll(diceMap[data.trueTierLevel - 1] || "3d6").evaluate();
  const startHP = baseTierHP + tierRoll.total;
  const pRoll = await new Roll(`${pBonus}d2`).evaluate();
  const hpAfterMiners = startHP - pRoll.total;
  const roll = await new Roll("1d20").evaluate();
  const d20 = roll.total;
  let pct = 0, pctText = "";
  if (d20 === 1) { pct = 40; pctText = "<span style='color:#e74c3c;'>+40% (CRIT FAIL)</span>"; }
  else if (d20 === 20) { pct = 0; pctText = "<span style='color:#2ecc71;'>+0% (CRIT SUCCESS)</span>"; }
  else { pct = (20 - d20) * 2; pctText = `+${pct}%`; }
  const pctAddition = Math.round(startHP * (pct / 100));
  const calculatedHP = hpAfterMiners + pctAddition;
  data.trueShellMax = Math.max(calculatedHP, baseTierHP);
  data.currentShellHP = data.trueShellMax;
  data.knownShell = true;
  const breakdown = `<div style="font-family:'Spectral',serif;font-size:0.95em;">
    <div style="color:#a29bfe;font-family:'Cinzel',serif;font-weight:bold;margin-bottom:4px;border-bottom:1px solid #444;">Extraction Diagnostics:</div>
    <div><b>1. Base Core:</b> ${baseTierHP} + [${tierRoll.total}] = <b>${startHP} HP</b></div>
    <div><b>2. Miner Impact:</b> ${startHP} - [${pRoll.total}] = <b>${hpAfterMiners} HP</b></div>
    <div><b>3. Scan Shift:</b> Rolled <b>${d20}</b> → <b>${pctText}</b> (+${pctAddition} HP)</div>
    <div style="margin-top:4px;padding-top:4px;border-top:1px dashed #444;">
    <b>4. Final Integrity:</b> ${hpAfterMiners} + ${pctAddition} = ${calculatedHP}<br>
    (Floor limit: ${baseTierHP}) → <span style="font-size:1.2em;color:#00e5ff;font-weight:bold;">${data.trueShellMax} HP</span></div></div>`;
  addChatMessage(breakdown);
  await token.document.setFlag("world", "lithomancy", data);
  await consumeActions(token, data, 0);
}

function doEditShell(token, data) {
  new Dialog({
    title: "Edit Shell HP",
    content: `<div class="litho-popup-box">
      <label style="color:#aaa;display:block;margin-bottom:4px;">Current HP:</label>
      <input type="number" id="hp-cur" value="${data.currentShellHP}" style="width:100%;margin-bottom:10px;background:#111;color:#fff;border:1px solid #444;padding:5px;border-radius:4px;">
      <label style="color:#aaa;display:block;margin-bottom:4px;">Max HP:</label>
      <input type="number" id="hp-max" value="${data.trueShellMax}" style="width:100%;background:#111;color:#fff;border:1px solid #444;padding:5px;border-radius:4px;">
    </div>`,
    buttons: {
      save: { label: "Save", callback: async (h) => {
        data.currentShellHP = parseInt(h.find('#hp-cur').val());
        data.trueShellMax = parseInt(h.find('#hp-max').val());
        await token.document.setFlag("world", "lithomancy", data);
        updateUI(token);
      }}
    }
  }).render(true);
}

async function doForecast(token, data) {
  const roll = await new Roll(`${data.round}d4`).evaluate();
  const costRoll = await new Roll("2d8").evaluate();
  addChatMessage(`<strong>Bio-Scrying:</strong> ${costRoll.total} HP sacrificed to forecast stability decay.`);
  data.nextDecayValue = roll.total;
  await token.document.setFlag("world", "lithomancy", data);
  updateUI(token);
}

async function consumeActions(token, data, cost, shellDamage = 0) {
  data.actionsUsed += cost;
  if (data.knownStability) {
    const range = Math.round((data.stabMax - data.stabMin) / 2);
    data.stabMin = Math.max(0, data.currentStability - range);
    data.stabMax = Math.min(20, data.currentStability + range);
  }
  if (data.currentShellHP <= 0) return triggerFinalImpact(token, data, shellDamage);
  if (data.currentStability <= 0) return triggerDetonation(token, data);
  await token.document.setFlag("world", "lithomancy", data);
  updateUI(token);
}

async function spinReel(title, options, target) {
  return new Promise(resolve => {
    let stripHtml = "";
    for (let i = 0; i < 60; i++) stripHtml += `<div class="reel-item">${options[Math.floor(Math.random()*options.length)]}</div>`;
    stripHtml += `<div class="reel-item" id="reel-target-item">${target}</div>`;
    for (let i = 0; i < 5; i++) stripHtml += `<div class="reel-item">${options[0]}</div>`;

    const dlg = new Dialog({
      title,
      content: `<div class="litho-popup-box">
        <div style="font-family:'Cinzel',serif;color:#a29bfe;font-size:0.9em;margin-bottom:8px;text-align:center;">${title}</div>
        <div class="reel-window"><div class="reel-strip" id="reel-strip-main">${stripHtml}</div><div class="reel-sigil"></div></div>
      </div>`,
      buttons: {}
    });
    dlg.render(true);

    setTimeout(() => {
      const strip = document.getElementById('reel-strip-main');
      if (!strip) { resolve(); return; }
      strip.style.transition = 'transform 8s cubic-bezier(0.1,0.9,0.2,1)';
      strip.style.transform = 'translateY(-1725px)';
      setTimeout(() => {
        document.getElementById('reel-target-item')?.classList.add('reel-glow');
        setTimeout(() => { dlg.close(); resolve(); }, 2000);
      }, 8200);
    }, 100);
  });
}

async function triggerRoundEnd(token, data) {
  let loss = 0;
  if (data.nextDecayValue !== null) { loss = data.nextDecayValue; data.nextDecayValue = null; }
  else {
    const roll = await new Roll(`${data.round}d4`).evaluate();
    loss = roll.total;
  }
  data.stabMax = Math.max(0, data.stabMax - loss);
  data.stabMin = Math.max(0, data.stabMin - loss);

  let historyHtml = (data.cycleHistory && data.cycleHistory.length > 0)
    ? data.cycleHistory.join("")

async function applyBlood(token, data, amount, power, type, isCrit, source) {
  const critText = isCrit ? " (PERFECT CONDUCTIVITY!)" : "";
  const srcLabel = source === 'npc' ? 'NPC' : 'Player';
  addChatMessage(`<strong>Bio-Infusion (${srcLabel}):</strong> ${amount}hp infused for ${power} charge${critText}.`);
  if (source === 'npc') data.npcBloodSacrificed = (data.npcBloodSacrificed || 0) + amount;
  else data.bloodSacrificed = (data.bloodSacrificed || 0) + amount;
  if (!data.cycleHistory) data.cycleHistory = [];
  const actNum = data.cycleHistory.filter(h=>h.includes("<b>Action")).length + 1;
  data.cycleHistory.push(`<div class="cycle-row"><div style="white-space:nowrap;width:140px;"><b>Action ${actNum}</b> (<span style="color:#2ecc71;">Bio-Infusion</span>)</div><div>Infused ${amount} ${srcLabel} HP for ${power} charge.</div></div>`);
  if (type === "shell") { data.currentShellHP = Math.max(0, data.currentShellHP - power); showDamagePopup(power); }
  else if (type === "heal") data.currentStability = Math.min(20, data.currentStability + power);
  else if (type === "res") narrowRange(data, "res", power);
  else if (type === "stab") narrowRange(data, "stab", power);
  await consumeActions(token, data, 0, type === "shell" ? power : 0);
}

      d.resMin = d.trueResonance; d.resMax = d.trueResonance;
    } else if (d20 === 1) {
      pctText = "<span style='color:#e74c3c;'>WIDENED SPREAD (NAT 1)</span>";
      d.resMin = Math.max(5, d.trueResonance - 12); d.resMax = Math.min(20, d.trueResonance + 12);
    } else {
      const range = total >= 20 ? 4 : 8;
      pctText = `±${range} Variance`;
      d.resMin = Math.max(5, d.trueResonance - range); d.resMax = Math.min(20, d.trueResonance + range);
    }
    d.knownResonance = true;
    addChatMessage(`<div style="font-family:'Spectral',serif;"><div style="color:#00e5ff;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">Frequency Diagnostics</div><div>Rolled <b>${d20}</b> + ${pBonus} = <b>${total}</b> → ${pctText}</div><div style="margin-top:4px;">Est: <b style="color:#00e5ff;">${d.resMin} – ${d.resMax}</b></div></div>`);
    await token.document.setFlag("world", "lithomancy", d);
    await consumeActions(token, d, 0);
  });

  html.find('#scan-stab').on('click', async () => {
    const d = token.document.getFlag("world", "lithomancy");
    if (d.actionsUsed >= 4) return;
    const pBonus = d.playerCount || 4;
    const roll = await new Roll(`1d20 + ${pBonus}`).evaluate();
    const d20 = roll.terms[0].results[0].result;
    const total = roll.total;
    let pctText = "";
    if (d20 === 20) {
      pctText = "<span style='color:#2ecc71;'>PERFECT READ (NAT 20)</span>";
      d.stabMin = d.trueStability; d.stabMax = d.trueStability;
    } else if (d20 === 1) {
      pctText = "<span style='color:#e74c3c;'>WIDENED SPREAD (NAT 1)</span>";
      d.stabMin = Math.max(0, d.trueStability - 12); d.stabMax = Math.min(20, d.trueStability + 12);
    } else {
      const range = total >= 20 ? 4 : 8;
      pctText = `±${range} Variance`;
      d.stabMin = Math.max(0, d.trueStability - range); d.stabMax = Math.min(20, d.trueStability + range);
    }
    d.knownStability = true;
    addChatMessage(`<div style="font-family:'Spectral',serif;"><div style="color:#f39c12;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">Volatility Diagnostics</div><div>Rolled <b>${d20}</b> + ${pBonus} = <b>${total}</b> → ${pctText}</div><div style="margin-top:4px;">Est: <b style="color:#f39c12;">${d.stabMin} – ${d.stabMax}</b></div></div>`);
    await token.document.setFlag("world", "lithomancy", d);
    await consumeActions(token, d, 0);
  });

  // DICE BUTTONS
  html.find('.dice-btn').on('click', async function() {
    const action = $(this).data('act');
    const count = parseInt($(this).data('n'));
    const d = token.document.getFlag("world", "lithomancy");

    if (action === "shell") {
      let totalDmg = 0, totalStabLoss = 0;
      let breakdown = [];
      for (let i = 0; i < count; i++) {
        let dType = "d4", bonus = 0, sLoss = 0;
        if (d.knownResonance && d.knownStability) {
          const delta = Math.abs(d.trueResonance - d.currentStability);
          if (delta === 0) { dType = "d8"; sLoss = 0; bonus = 2; }
          else if (delta <= 3) { bonus = 2; sLoss = 1; }
          else if (delta <= 9) { bonus = 1; sLoss = 1; }
          else { bonus = -1; sLoss = 1; }
        } else { sLoss = 1; }
        const roll = await new Roll(`1${dType} + ${bonus}`).evaluate();
        const dmg = Math.max(0, roll.total);
        d.currentShellHP = Math.max(0, d.currentShellHP - dmg);
        d.currentStability = Math.max(0, d.currentStability - sLoss);
        totalDmg += dmg; totalStabLoss += sLoss;
        breakdown.push(`<div style="margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed #444;">
          <div style="font-weight:bold;color:#dcdcdc;">Hit ${i+1}</div>
          <div style="display:grid;grid-template-columns:1fr auto;font-size:0.9em;color:#aaa;padding-left:6px;">
            <span>Roll:</span><span style="color:#fff;">${roll.total - bonus}</span>
            <span>Coherence Bonus:</span><span style="color:#a29bfe;">${bonus}</span>
            <span style="font-weight:bold;color:#ddd;">Total DMG:</span><span style="font-weight:bold;color:#2ecc71;">${dmg}</span>
          </div></div>`);
        if (d.currentStability <= 0) { breakdown.push(`<div style="color:#e74c3c;font-weight:bold;text-align:center;margin-top:4px;">⛔ CORE DESTABILIZED — SEQUENCE HALTED ⛔</div>`); break; }
        if (d.currentShellHP <= 0) { breakdown.push(`<div style="color:#2ecc71;font-weight:bold;text-align:center;margin-top:4px;">💎 SHELL FRACTURED — HARVEST READY 💎</div>`); break; }
      }
      addChatMessage(`<div style="font-family:'Spectral',serif;"><div style="color:#00e5ff;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">FRACTURE SEQUENCE (x${count})</div><div style="margin-top:4px;">${breakdown.join("")}</div><div style="border-top:1px dashed #444;margin-top:4px;padding-top:4px;"><strong>Total:</strong> ${totalDmg} DMG / -${totalStabLoss} Stability</div></div>`);
      showDamagePopup(totalDmg);
      if (!d.cycleHistory) d.cycleHistory = [];
      const actNum = d.cycleHistory.filter(h=>h.includes("<b>Action")).length + 1;
      d.cycleHistory.push(`<div class="cycle-row"><div style="white-space:nowrap;width:140px;"><b>Action ${actNum}</b> (<span style="color:#a29bfe;">Fracture x${count}</span>)</div><div>-${totalDmg} HP / -${totalStabLoss} Stab</div></div>`);
      await consumeActions(token, d, count, totalDmg);
      return;
    }

    // Standard actions
    const rollStr = `${count}d4`;
    const roll = await new Roll(rollStr).evaluate();
    let actionDesc = "", chatFlavor = "";

    if (action === "heal") {
      d.currentStability = Math.min(20, d.currentStability + roll.total);
      actionDesc = `Increased stability by ${roll.total}.`;
      chatFlavor = `<div style="font-family:'Spectral',serif;"><div style="color:#2ecc71;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">STABILIZE CORE</div><div>Rolled <b>${roll.total}</b> (${rollStr})</div><div>${actionDesc}</div></div>`;
    } else if (action === "res") {
      const oldMin = d.resMin, oldMax = d.resMax;
      narrowRange(d, "res", roll.total);
      actionDesc = `Narrowed harmony from [${oldMin}-${oldMax}] to [${d.resMin}-${d.resMax}].`;
      chatFlavor = `<div style="font-family:'Spectral',serif;"><div style="color:#00e5ff;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">TUNE HARMONY</div><div>Rolled <b>${roll.total}</b> (${rollStr})</div><div>${actionDesc}</div></div>`;
    } else if (action === "narrow") {
      const oldMin = d.stabMin, oldMax = d.stabMax;
      narrowRange(d, "stab", roll.total);
      actionDesc = `Narrowed volatility from [${oldMin}-${oldMax}] to [${d.stabMin}-${d.stabMax}].`;
      chatFlavor = `<div style="font-family:'Spectral',serif;"><div style="color:#f39c12;font-family:'Cinzel',serif;font-weight:bold;border-bottom:1px solid #444;">TUNE VOLATILITY</div><div>Rolled <b>${roll.total}</b> (${rollStr})</div><div>${actionDesc}</div></div>`;
    }

    addChatMessage(chatFlavor);
    if (!d.cycleHistory) d.cycleHistory = [];
    const actNum = d.cycleHistory.filter(h=>h.includes("<b>Action")).length + 1;
    d.cycleHistory.push(`<div class="cycle-row"><div style="white-space:nowrap;width:140px;"><b>Action ${actNum}</b> (<span style="color:#a29bfe;">${actionLabel(action)}</span>)</div><div>${actionDesc}</div></div>`);
    await consumeActions(token, d, count, 0);
  });

  // BLOOD INFUSE
  html.find('#btn-blood').on('click', async () => {
    const amount = parseInt(html.find('#inp-blood').val());
    const source = html.find('#inp-blood-src').val();
    if (!amount || amount < 10) return showNotif("Infusion must be at least 10 HP.", 'error');
    const d = token.document.getFlag("world", "lithomancy");
    const s = computeDerivedState(d);
    let power = Math.floor(amount / 10);
    let critMsg = "";
    if (s.isHarmonized) { power *= 2; critMsg = " <span style='color:#2ed573;font-weight:bold;'>(PERFECT CONDUCTIVITY!)</span>"; }
    new Dialog({
      title: `Bio-Infusion (+${power})`,
      content: `<div class="litho-popup-box">
        <div style="font-family:'Cinzel',serif;font-weight:700;color:#00e5ff;letter-spacing:1px;margin-bottom:6px;">Vital Essence Transfer</div>
        <p style="margin:0;">Infuse <strong>${amount} HP</strong> → generate <strong>${power}</strong> charge${critMsg}.</p>
        <p style="margin:8px 0 0 0;color:#777;font-size:0.9em;">Select target system.</p>
      </div>`,
      buttons: {
        shell: { label: "Fracture Shell", callback: () => applyBlood(token, d, amount, power, "shell", s.isHarmonized, source) },
        heal:  { label: "Reinforce Core", callback: () => applyBlood(token, d, amount, power, "heal",  s.isHarmonized, source) },
        res:   { label: "Tune Harmony",   callback: () => applyBlood(token, d, amount, power, "res",   s.isHarmonized, source) },
        stab:  { label: "Tune Volatility",callback: () => applyBlood(token, d, amount, power, "stab",  s.isHarmonized, source) }
      }
    }).render(true);
  });

  updateUI(token);
}

// ── BOOT ─────────────────────────────────────────────────────
(async () => {
  if (!nodeToken.document.getFlag("world", "lithomancy")) {
    await initializeNode(nodeToken);
  }
  openLithomancyMonitor(nodeToken, null);
})();
</script>
</body>
</html>
